<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>全ツール一覧 (便利ツールボックス)</title>

    <style>
        body { margin: 0; background-color: #f4f7f6; font-family: Arial, sans-serif; color: #333; }

        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            background-color: #fff; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); 
        }

        h1 { 
            text-align: center; 
            color: #007bff; 
            border-bottom: 3px solid #b8daff; 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
        }
        
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; 
        }

        .tool-card-link {
            text-decoration: none; 
            color: inherit;
        }

        .tool-card {
            background-color: #f8faff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #d6eaff;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; 
            flex-direction: column;
            height: 100%;
            /* スマホではみ出さないための追加 */
            box-sizing: border-box;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0, 123, 255, 0.2);
        }

        .tool-card h2 {
            margin-top: 0;
            color: #007bff;
            font-size: 1.4em;
            margin-bottom: 10px;
        }

        .tool-card p {
            font-size: 0.9em;
            color: #555;
            min-height: 40px; 
            flex-grow: 1; 
        }

        .tool-link-button {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            background-color: #28a745;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }

        #tool-list-container p {
            text-align: center;
            grid-column: 1 / -1; 
        }

        /* パソコンでの状態は維持しつつ、スマホ対応 */
        @media (max-width: 950px) {
            .container {
                margin: 20px 10px; 
                padding: 20px;
            }
        }

        /* 画面がさらに狭いスマホ用の追加（横揺れ防止） */
        @media (max-width: 480px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
    <style>
    @keyframes popupAnim {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    /* ポップアップ表示中は背景を動かさない */
    body.modal-open { overflow: hidden; }
</style>
</head>
<body>
    <div id="renewal-overlay" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div style="position: relative; background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: popupAnim 0.4s ease-out;">
        
        <!-- 閉じるボタン -->
        <button onclick="closeRenewal()" style="position: absolute; top: 15px; right: 15px; background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; color: #666; font-weight: bold;">✕</button>

        <!-- リニューアル画像 (ここに画像URLを入れてください) -->
        <img src="techsta.png" alt="TECHSTAロゴ" style="width: 100%; max-width: 250px; margin-bottom: 20px; border-radius: 12px;">

        <h2 style="color: #007bff; margin: 0 0 10px 0; font-size: 24px;">TECHSTAへ<br>リニューアルしました！</h2>
        <p style="color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 25px;">
            「便利ツールボックス」は、より新しく、より使いやすく。<br>
            新ブランド<b>「TECHSTA（テクスタ）」</b>として<br>
            生まれ変わりました。
        </p>

        <a href="/app/techsta_jp.html" style="display: block; background: #007bff; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,123,255,0.3);">
            新ホームへ行く
        </a>
        <button onclick="closeRenewal()" style="margin-top: 15px; background: none; border: none; color: #86868b; cursor: pointer; font-size: 12px; text-decoration: underline;">
            このままツール一覧を見る
        </button>
    </div>
</div>
    <div class="container">
        <h1>🛠️ 全ツール一覧</h1>
        <p style="text-align: center; margin-bottom: 30px;">現在利用可能なすべての便利なツールをまとめています。</p>

        <div class="tool-grid" id="tool-list-container">
            <p>ツールリストをロード中...</p>
        </div>
        
        <p style="text-align: center; margin-top: 40px;">
            <a href="index.html" style="color: #007bff;">📝 メインの文字数カウントへ戻る</a>
        </p>
    </div>

    <script>
        const JSON_URL = 'tools.json';

        async function loadAndRenderTools() {
            const container = document.getElementById('tool-list-container');
            if (!container) return;
            
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) {
                    throw new Error('ネットワークエラー、またはJSONファイルが見つかりません。');
                }
                const toolsData = await response.json();
                
                container.innerHTML = '';
                
                toolsData.forEach(tool => {
                    const linkHref = tool.href.endsWith('.html') ? tool.href : tool.href + '.html';

                    const cardHtml = `
                        <a href="${linkHref}" class="tool-card-link">
                            <div class="tool-card">
                                <h2>${tool.icon} ${tool.title}</h2>
                                <p>${tool.description}</p>
                                <span class="tool-link-button">ツールを使う</span>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                console.error('ツールデータの読み込みに失敗しました:', error);
                container.innerHTML = `<p style="color:red; font-size:0.9em;">エラー: データ (${JSON_URL}) を読み込めません。</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRenderTools);
    </script>
    <script>
    // ページ読み込み時にモーダル用のクラスをつける
    document.body.classList.add('modal-open');

    function closeRenewal() {
        const overlay = document.getElementById('renewal-overlay');
        overlay.style.display = 'none';
        document.body.classList.remove('modal-open');
    }
</script>
</body>
</html>
