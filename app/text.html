<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ユーティリティ</title>
    
    <!-- PWA設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2912/2912205.png">

    <style>
        :root {
            --primary: #007AFF;
            --bg: #ffffff;
            --card-bg: #f2f2f7;
            --text: #1c1c1e;
            --sub-text: #8e8e93;
            --border: rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "BIZ UDPGothic", sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            -webkit-user-select: none;
        }

        /* ヘッダーを消して余白のみ調整 */
        .spacer {
            height: env(safe-area-inset-top);
            background: var(--bg);
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 入力エリア */
        .input-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 17px;
            color: var(--text);
            resize: none;
            outline: none;
            min-height: 200px;
            padding: 0;
            -webkit-user-select: text;
        }

        /* カウント表示 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .status-item { text-align: center; }
        .num { font-size: 22px; font-weight: 700; color: var(--primary); display: block; }
        .label { font-size: 11px; color: var(--sub-text); }

        /* 整形ボタン */
        .tool-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        button {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        button:active { background: #ebebeb; transform: scale(0.98); }
        button.main-btn { background: var(--primary); color: white; border: none; }

        /* 比較用 */
        .diff-container { display: flex; flex-direction: column; gap: 10px; }
        .diff-box {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 15px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 15px;
            font-size: 14px;
            border: 1px solid var(--border);
        }
        del { background: #ffdbdb; color: #b91d1d; text-decoration: none; border-radius: 2px; }
        ins { background: #e6f7ed; color: #1db954; text-decoration: none; border-radius: 2px; }

        /* ボトムナビ */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            color: var(--sub-text);
            font-size: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        @media (min-width: 768px) {
            .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
            .view-section { display: block !important; }
            .nav-bar { display: none; }
        }
    </style>
</head>
<body>

<div class="spacer"></div>

<div class="main-container">
    <!-- カウント・整形 -->
    <section id="countView" class="view-section active">
        <div class="input-card">
            <textarea id="mainInput" placeholder="ここに文字を入力..."></textarea>
            <div class="status-grid">
                <div class="status-item"><span id="vAll" class="num">0</span><span class="label">すべて</span></div>
                <div class="status-item"><span id="vNoS" class="num">0</span><span class="label">空白なし</span></div>
                <div class="status-item"><span id="vLine" class="num">0</span><span class="label">行数</span></div>
            </div>
        </div>
        <div class="tool-row">
            <button onclick="convert('zen')">全角に変換</button>
            <button onclick="convert('han')">半角に変換</button>
            <button onclick="convert('up')">大文字</button>
            <button onclick="convert('low')">小文字</button>
        </div>
    </section>

    <!-- 比較 -->
    <section id="diffView" class="view-section">
        <div class="diff-container">
            <div class="input-card" style="min-height: 100px; margin-bottom: 0;">
                <textarea id="diffA" style="min-height: 80px;" placeholder="比較元テキスト"></textarea>
            </div>
            <div class="input-card" style="min-height: 100px; margin-bottom: 0;">
                <textarea id="diffB" style="min-height: 80px;" placeholder="比較先テキスト"></textarea>
            </div>
            <button class="main-btn" onclick="compare()">内容を比較</button>
            <div id="diffOutput" class="diff-box">比較結果がここに表示されます</div>
        </div>
    </section>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="show('count')">
        <span class="nav-icon">✍️</span>文字数
    </div>
    <div class="nav-item" onclick="show('diff')">
        <span class="nav-icon">⚖️</span>比較
    </div>
</nav>

<script>
    // バージョン管理用 (更新反映対策)
    const APP_VERSION = '1.0.2'; 

    // カウントロジック
    const input = document.getElementById('mainInput');
    input.addEventListener('input', () => {
        const val = input.value;
        document.getElementById('vAll').innerText = val.length.toLocaleString();
        document.getElementById('vNoS').innerText = val.replace(/\s/g, '').length.toLocaleString();
        document.getElementById('vLine').innerText = val ? val.split('\n').length : 0;
    });

    // 整形ロジック
    function convert(mode) {
        let t = input.value;
        if(mode === 'zen') t = t.replace(/[!-~]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0));
        if(mode === 'han') t = t.replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
        if(mode === 'up') t = t.toUpperCase();
        if(mode === 'low') t = t.toLowerCase();
        input.value = t;
        input.dispatchEvent(new Event('input'));
    }

    // タブ切り替え
    function show(page) {
        if (window.innerWidth >= 768) return;
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page + 'View').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // 比較ロジック
    function compare() {
        const a = document.getElementById('diffA').value;
        const b = document.getElementById('diffB').value;
        const out = document.getElementById('diffOutput');
        
        let i = 0, j = 0, res = "";
        const m = Array(a.length + 1).fill().map(() => Array(b.length + 1).fill(0));
        for(let i=1; i<=a.length; i++) {
            for(let j=1; j<=b.length; j++) {
                m[i][j] = a[i-1] === b[j-1] ? m[i-1][j-1] + 1 : Math.max(m[i-1][j], m[i][j-1]);
            }
        }
        let build = (i, j) => {
            if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
                build(i-1, j-1); res += a[i-1];
            } else if (j > 0 && (i === 0 || m[i][j-1] >= m[i-1][j])) {
                build(i, j-1); res += `<ins>${b[j-1]}</ins>`;
            } else if (i > 0 && (j === 0 || m[i][j-1] < m[i-1][j])) {
                build(i-1, j); res += `<del>${a[i-1]}</del>`;
            }
        };
        build(a.length, b.length);
        out.innerHTML = res || "一致しています";
    }

    // 更新対策: ページ読み込み時にキャッシュをチェック
    window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=' + APP_VERSION).then(reg => {
                reg.update(); // 起動時に強制的に更新をチェックさせる
            });
        }
    });
</script>
</body>
</html>
