<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SURGE PRO Utility</title>
    
    <!-- PWA Settings (ホーム画面追加用) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2912/2912205.png">

    <style>
        :root {
            --primary: #007AFF;
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
            --card: #ffffff;
            --text: #1c1c1e;
            --accent: #5856d6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg);
            margin: 0; color: var(--text);
            line-height: 1.5;
        }

        /* --- UI Components --- */
        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: calc(15px + env(safe-area-inset-top)) 20px 10px;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            text-align: center;
        }

        .main-container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; gap: 20px;
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card); border-radius: 18px; padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        textarea {
            width: 100%; border: 1px solid #e5e5ea; border-radius: 12px;
            font-size: 16px; padding: 15px; outline: none; transition: border 0.2s;
            background: #fbfbfd;
        }
        textarea:focus { border-color: var(--primary); background: #fff; }

        /* --- Buttons & Tools --- */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button.secondary { background: #e5e5ea; color: var(--text); }
        button:active { transform: scale(0.96); opacity: 0.8; }

        /* --- Icons --- */
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* --- Tab Bar --- */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex; padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 10px 0; color: #8e8e93; font-size: 10px; font-weight: 500;
        }
        .tab-item.active { color: var(--primary); }

        /* --- Desktop --- */
        @media (min-width: 768px) {
            .main-container { grid-template-columns: 1fr 1fr; }
            .view-section { display: block !important; }
            .tab-bar { display: none; }
        }

        /* --- Diff Colors --- */
        del { background: #ffdbdb; color: #b91d1d; text-decoration: none; }
        ins { background: #e6f7ed; color: #1db954; text-decoration: none; }
        .diff-box { background: #f8f8f8; padding: 15px; border-radius: 12px; font-family: monospace; }
    </style>
</head>
<body>

<header><h1>SURGE PRO</h1></header>

<div class="main-container">
    <!-- 文字数カウント & 整形 -->
    <section id="countSec" class="view-section active">
        <div class="card">
            <h2>Editor</h2>
            <textarea id="editor" rows="10" placeholder="テキストを入力..."></textarea>
            
            <div class="btn-grid">
                <button class="secondary" onclick="formatText('zenkaku')">全角に変換</button>
                <button class="secondary" onclick="formatText('hankaku')">半角に変換</button>
                <button class="secondary" onclick="formatText('upper')">大文字</button>
                <button class="secondary" onclick="formatText('lower')">小文字</button>
            </div>

            <div style="display:flex; justify-content: space-around; margin-top:20px; text-align:center;">
                <div><b id="cAll" style="font-size:24px; color:var(--primary);">0</b><br><small>文字(込)</small></div>
                <div><b id="cNoS" style="font-size:24px; color:var(--accent);">0</b><br><small>文字(抜)</small></div>
                <div><b id="cLine" style="font-size:24px;">0</b><br><small>行数</small></div>
            </div>
        </div>
    </section>

    <!-- 文字列比較 -->
    <section id="diffSec" class="view-section">
        <div class="card">
            <h2>Compare</h2>
            <textarea id="txtA" rows="4" placeholder="元テキスト"></textarea>
            <div style="height:10px"></div>
            <textarea id="txtB" rows="4" placeholder="新テキスト"></textarea>
            <button style="width:100%; margin-top:10px;" onclick="runDiff()">差分を抽出</button>
            <div id="diffRes" class="diff-box" style="margin-top:15px;">結果はこちら...</div>
        </div>
    </section>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="tab('count')">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 5h18v2H3V5zm0 6h18v2H3v-2zm0 6h18v2H3v-2z"/></svg>
        <span>エディタ</span>
    </div>
    <div class="tab-item" onclick="tab('diff')">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 4l2 2-2 2V6h-5V4h5zm-7 13H6v-2l-2 2 2 2v-2h5v-2zM5 10h14v2H5v-2zm0 4h14v2H5v-2z"/></svg>
        <span>比較</span>
    </div>
</nav>

<script>
    const ed = document.getElementById('editor');
    
    // カウント機能
    ed.addEventListener('input', () => {
        const val = ed.value;
        document.getElementById('cAll').innerText = val.length;
        document.getElementById('cNoS').innerText = val.replace(/\s/g, '').length;
        document.getElementById('cLine').innerText = val ? val.split('\n').length : 0;
    });

    // テキスト整形機能 (新機能)
    function formatText(type) {
        let txt = ed.value;
        if(type === 'zenkaku') txt = txt.replace(/[!-~]/g, s => String.fromCharCode(s.charCodeAt(0) + 0xFEE0));
        if(type === 'hankaku') txt = txt.replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
        if(type === 'upper') txt = txt.toUpperCase();
        if(type === 'lower') txt = txt.toLowerCase();
        ed.value = txt;
        ed.dispatchEvent(new Event('input'));
    }

    // タブ切り替え
    function tab(name) {
        if (window.innerWidth >= 768) return;
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        const idx = name === 'count' ? 0 : 1;
        document.getElementById(name + 'Sec').classList.add('active');
        document.querySelectorAll('.tab-item')[idx].classList.add('active');
    }

    // 差分抽出 (改良版)
    function runDiff() {
        const a = document.getElementById('txtA').value;
        const b = document.getElementById('txtB').value;
        const out = document.getElementById('diffRes');
        
        let i = 0, j = 0, res = "";
        while (i < a.length || j < b.length) {
            if (a[i] === b[j]) { res += a[i]; i++; j++; }
            else {
                let nextA = a.indexOf(b[j], i);
                if (nextA !== -1) {
                    while (i < nextA) { res += `<del>${a[i]}</del>`; i++; }
                } else if (j < b.length) {
                    res += `<ins>${b[j]}</ins>`; j++;
                } else {
                    res += `<del>${a[i]}</del>`; i++;
                }
            }
        }
        out.innerHTML = res || "一致しています";
    }
</script>
</body>
</html>
