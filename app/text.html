<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SURGE PRO Utility</title>
    
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --border-color: #C6C6C8;
            --diff-del: #ffdbdb;
            --diff-del-text: #b91d1d;
            --diff-ins: #e6f7ed;
            --diff-ins-text: #1db954;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: calc(15px + env(safe-area-inset-top)) 20px 10px;
            z-index: 100;
            border-bottom: 0.5px solid var(--border-color);
            text-align: center;
        }

        header h1 { margin: 0; font-size: 17px; font-weight: 600; }

        .main-container {
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            gap: 20px;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h2 { font-size: 14px; color: var(--text-sub); margin-top: 0; margin-bottom: 12px; }

        textarea {
            width: 100%;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            min-height: 120px;
        }

        /* カウント結果のグリッド */
        .count-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .count-item {
            background: #f8f8f8;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .val { font-size: 20px; font-weight: bold; color: var(--primary-color); display: block; }
        .lbl { font-size: 10px; color: var(--text-sub); }

        /* 差分表示エリア */
        .diff-output {
            margin-top: 15px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            border: 1px solid #eee;
        }

        del { background-color: var(--diff-del); color: var(--diff-del-text); text-decoration: none; border-radius: 2px; }
        ins { background-color: var(--diff-ins); color: var(--diff-ins-text); text-decoration: none; border-radius: 2px; }

        button {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .main-container { display: grid; grid-template-columns: 1fr 1fr; }
            .view-section { display: block !important; }
            .tab-bar { display: none !important; }
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border-color);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; color: var(--text-sub); }
        .tab-item.active { color: var(--primary-color); }
        .tab-label { font-size: 10px; }
    </style>
</head>
<body>

<header><h1>SURGE PRO Utility</h1></header>

<div class="main-container">
    <section id="countSection" class="view-section active">
        <div class="card">
            <h2>文字数カウント</h2>
            <textarea id="counterInput" placeholder="入力してください..."></textarea>
            <div class="count-grid">
                <div class="count-item"><span id="cAll" class="val">0</span><span class="lbl">すべて</span></div>
                <div class="count-item"><span id="cNoSpace" class="val">0</span><span class="lbl">空白なし</span></div>
                <div class="count-item"><span id="cLines" class="val">0</span><span class="lbl">行数</span></div>
                <div class="count-item"><span id="cPara" class="val">0</span><span class="lbl">段落</span></div>
            </div>
        </div>
    </section>

    <section id="compareSection" class="view-section">
        <div class="card">
            <h2>文字列比較 (Diff)</h2>
            <textarea id="diffA" style="min-height: 80px; font-size: 14px;" placeholder="比較元..."></textarea>
            <div style="height: 10px;"></div>
            <textarea id="diffB" style="min-height: 80px; font-size: 14px;" placeholder="比較先..."></textarea>
            <button onclick="runDiff()">差分をハイライト</button>
            <div id="diffResult" class="diff-output">比較結果がここに表示されます</div>
        </div>
    </section>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="showTab('count')"><span class="tab-label">カウント</span></div>
    <div class="tab-item" onclick="showTab('compare')"><span class="tab-label">比較</span></div>
</nav>

<script>
    // タブ切り替え
    function showTab(tab) {
        if (window.innerWidth >= 768) return;
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        if(tab === 'count') {
            document.getElementById('countSection').classList.add('active');
            document.querySelectorAll('.tab-item')[0].classList.add('active');
        } else {
            document.getElementById('compareSection').classList.add('active');
            document.querySelectorAll('.tab-item')[1].classList.add('active');
        }
    }

    // 文字数カウント (空白除外ロジック追加)
    document.getElementById('counterInput').addEventListener('input', (e) => {
        const text = e.target.value;
        const noSpace = text.replace(/\s+/g, ''); // スペース、タブ、改行をすべて除去
        
        document.getElementById('cAll').innerText = text.length.toLocaleString();
        document.getElementById('cNoSpace').innerText = noSpace.length.toLocaleString();
        document.getElementById('cLines').innerText = text ? text.split('\n').length : 0;
        document.getElementById('cPara').innerText = text ? text.split(/\n+/).filter(p => p.trim() !== "").length : 0;
    });

    // 簡易Diffロジック (文字単位)
    function runDiff() {
        const a = document.getElementById('diffA').value;
        const b = document.getElementById('diffB').value;
        const out = document.getElementById('diffResult');
        
        if (!a && !b) { out.innerText = "テキストを入力してください"; return; }

        // シンプルな最長共通部分列(LCS)ではなく、視覚的な簡易比較アルゴリズム
        // 今回は文字単位の差分を表示
        let resultHTML = "";
        let i = 0, j = 0;

        // 外部ライブラリなしで動く簡易的な比較表示
        // ※ 本格的なDiffにはdiff-match-patch等が使われますが、単一ファイルで動くよう自作
        const matrix = Array(a.length + 1).fill().map(() => Array(b.length + 1).fill(0));
        for(let i=1; i<=a.length; i++) {
            for(let j=1; j<=b.length; j++) {
                matrix[i][j] = a[i-1] === b[j-1] ? matrix[i-1][j-1] + 1 : Math.max(matrix[i-1][j], matrix[i][j-1]);
            }
        }

        let backtrack = (i, j) => {
            if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
                backtrack(i-1, j-1);
                resultHTML += a[i-1];
            } else if (j > 0 && (i === 0 || matrix[i][j-1] >= matrix[i-1][j])) {
                backtrack(i, j-1);
                resultHTML += `<ins>${b[j-1]}</ins>`;
            } else if (i > 0 && (j === 0 || matrix[i][j-1] < matrix[i-1][j])) {
                backtrack(i-1, j);
                resultHTML += `<del>${a[i-1]}</del>`;
            }
        };
        
        backtrack(a.length, b.length);
        out.innerHTML = resultHTML || "変化なし";
    }
</script>
</body>
</html>
