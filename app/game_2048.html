<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SURGE 2048</title>
    <style>
        :root { --bg: #bbada0; --cell: #cdc1b4; --text: #776e65; }
        body { margin: 0; background: #faf8ef; font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        .header { margin-top: 20px; text-align: center; }
        #score-container { background: #bbada0; padding: 10px 20px; border-radius: 6px; color: white; font-weight: bold; }
        #game-container { width: 300px; height: 300px; background: var(--bg); border-radius: 6px; position: relative; padding: 10px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; height: 100%; }
        .cell { background: var(--cell); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: var(--text); }
        /* 数字ごとの色設定（SURGE風） */
        .n-2 { background: #eee4da; }
        .n-4 { background: #ede0c8; }
        .n-8 { background: #f2b179; color: white; }
        .n-16 { background: #f59563; color: white; }
        .n-32 { background: #f67c5f; color: white; }
        .n-64 { background: #f65e3b; color: white; }
        .n-128 { background: #edcf72; color: white; font-size: 16px; }
        .n-256 { background: #edcc61; color: white; font-size: 16px; }
        .n-512 { background: #007AFF; color: white; font-size: 16px; } /* TECHSTA Blue */
        .n-1024 { background: #5856D6; color: white; font-size: 14px; } /* PRO Purple */
        .n-2048 { background: #1d1d1f; color: white; font-size: 14px; } /* SURGE Black */

        .ad-box { margin-top: 30px; width: 100%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: #776e65;">SURGE 2048</h2>
        <div id="score-container">SCORE: <span id="score">0</span></div>
    </div>

    <div id="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <p style="font-size: 12px; color: #776e65; margin-top: 15px;">スワイプまたは矢印キーで操作</p>

    <div class="ad-box">
        <div id="ad-game-2048"></div>
    </div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;

        function init() {
            addRandom();
            addRandom();
            draw();
        }

        function addRandom() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
        }

        function draw() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board.forEach(v => {
                const div = document.createElement('div');
                div.className = `cell ${v ? 'n-' + v : ''}`;
                div.innerText = v || '';
                grid.appendChild(div);
            });
            document.getElementById('score').innerText = score;
        }

        function slide(row) {
            let filtered = row.filter(v => v);
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i+1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    filtered.splice(i+1, 1);
                }
            }
            while (filtered.length < 4) filtered.push(0);
            return filtered;
        }

        function move(dir) {
            let oldBoard = [...board];
            for (let i = 0; i < 4; i++) {
                let row = [];
                for (let j = 0; j < 4; j++) {
                    if (dir === 'left' || dir === 'right') row.push(board[i * 4 + j]);
                    else row.push(board[j * 4 + i]);
                }
                if (dir === 'right' || dir === 'down') row.reverse();
                row = slide(row);
                if (dir === 'right' || dir === 'down') row.reverse();
                for (let j = 0; j < 4; j++) {
                    if (dir === 'left' || dir === 'right') board[i * 4 + j] = row[j];
                    else board[j * 4 + i] = row[j];
                }
            }
            if (JSON.stringify(oldBoard) !== JSON.stringify(board)) {
                addRandom();
                draw();
            }
        }

        // 操作イベント
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });

        // スワイプ操作
        let tsX, tsY;
        document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            let dx = e.changedTouches[0].clientX - tsX;
            let dy = e.changedTouches[0].clientY - tsY;
            if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
        });

        // 広告
        const ads = [
            `<a href="//af.moshimo.com/af/c/click?a_id=5526071&p_id=5941&pc_id=16548&pl_id=75907" rel="nofollow"><img src="//image.moshimo.com/af-img/5687/000000075907.jpg" width="100%" style="border-radius:12px;"></a>`,
            `<a href="//af.moshimo.com/af/c/click?a_id=5526070&p_id=1225&pc_id=1925&pl_id=18523" rel="nofollow"><img src="//image.moshimo.com/af-img/0349/000000018523.png" width="300" style="border:none;"></a>`
        ];
        document.getElementById('ad-game-2048').innerHTML = `<span style="font-size:10px; color:#888;">[広告]</span><br>` + ads[Math.floor(Math.random() * ads.length)];

        init();
    </script>
</body>
</html>
