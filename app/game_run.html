<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECHSTA GAME - RUN</title>
    <style>
        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --bg: #ffffff;
        }
        body {
            margin: 0;
            background: var(--bg);
            overflow-x: hidden; /* 横スクロール防止 */
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; /* ブラウザのダブルタップズームを無効化 */
        }
        .info {
            margin-top: env(safe-area-inset-top, 20px);
            text-align: center;
            z-index: 10;
        }
        #score {
            font-size: 40px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        canvas {
            background-color: #fafafa;
            border-bottom: 2px solid #eee;
            display: block;
            width: 100%; /* 画面幅いっぱいに表示 */
            max-width: 600px; /* PCでの見えすぎ防止 */
            height: auto;
        }
        .ad-container {
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .ad-label { display: block; font-size: 10px; color: #86868b; text-align: center; margin-bottom: 4px; }
        .ad-box { width: 100%; text-align: center; overflow: hidden; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="info">
        <div id="score">0</div>
        <p style="margin: 5px 0; font-size: 14px; color: #666;">タップでジャンプ！</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div class="ad-container">
        <div id="ad-game-play" class="ad-box"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // スマホ対応：画面幅に合わせてリサイズ
        function resize() {
            const containerWidth = Math.min(window.innerWidth, 600);
            canvas.width = containerWidth;
            canvas.height = 300; // スマホで見やすい高さに
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let gameActive = true;

        const player = {
            x: 40,
            y: 200,
            width: 30,
            height: 30,
            gravity: 0.5, // 少しふわっとさせてスマホでも避けやすく
            velocity: 0,
            jump: -8,
            color: '#007AFF'
        };

        const obstacles = [];
        let frameCount = 0;

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 8);
            ctx.fill();
        }

        function createObstacle() {
            // スコアが上がるほど頻度を上げる
            const frequency = Math.max(50, 90 - Math.floor(score / 5) * 5);
            if (frameCount % frequency === 0) {
                const height = Math.random() * (canvas.height - 150) + 40;
                obstacles.push({
                    x: canvas.width,
                    y: canvas.height - height,
                    width: 35,
                    height: height,
                    color: '#FF3B30',
                    passed: false
                });
            }
        }

        function drawObstacles() {
            obstacles.forEach((obs, index) => {
                obs.x -= (5 + (score / 10)); // スコアに応じて速度アップ
                ctx.fillStyle = obs.color;
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
                ctx.fill();

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver();
                }

                if (obs.x + obs.width < player.x && !obs.passed) {
                    score++;
                    obs.passed = true;
                    scoreElement.innerText = score;
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                }
            });
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.velocity += player.gravity;
            player.y += player.velocity;

            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.velocity = 0;
            }
            if (player.y < 0) {
                player.y = 0;
                player.velocity = 0;
            }

            drawPlayer();
            createObstacle();
            drawObstacles();

            frameCount++;
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            // アラートの前に少しだけ待つと、ぶつかった瞬間が見えて納得感が出る
            setTimeout(() => {
                alert(`GAME OVER!\nスコア: ${score}`);
                location.reload();
            }, 100);
        }

        // スマホ用：画面全体のどこを触っても反応
        const handleAction = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            if (gameActive) player.velocity = player.jump;
        };

        window.addEventListener('mousedown', handleAction);
        window.addEventListener('touchstart', handleAction, { passive: false });

        // 広告
        const ads = [
            `<a href="//af.moshimo.com/af/c/click?a_id=5526071&p_id=5941&pc_id=16548&pl_id=75907" rel="nofollow"><img src="//image.moshimo.com/af-img/5687/000000075907.jpg" width="100%" style="max-width:728px; border-radius:12px;"></a>`,
            `<a href="//af.moshimo.com/af/c/click?a_id=5526070&p_id=1225&pc_id=1925&pl_id=18523" rel="nofollow"><img src="//image.moshimo.com/af-img/0349/000000018523.png" width="320" style="border:none;"></a>`
        ];

        function refreshAds() {
            const adHtml = ads[Math.floor(Math.random() * ads.length)];
            const box = document.getElementById('ad-game-play');
            if (box) box.innerHTML = `<span class="ad-label">[広告]</span>` + adHtml;
        }

        window.addEventListener('load', () => {
            refreshAds();
            update();
        });
    </script>
</body>
</html>
