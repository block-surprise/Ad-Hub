<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TECHSTA</title>
    <link rel="apple-touch-icon" href="t.png">
    <link rel="icon" href="t.png" type="image/png">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
        }

        .logo-container {
            text-align: center;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--primary);
            
            /* 【修正点】最初は完全に透明、かつボケを強く設定 */
            opacity: 0;
            filter: blur(30px);
            transform: scale(0.9);
            
            /* アニメーション：0.3秒ほど「無」の状態を作ってから現れるように調整 */
            animation: reveal 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes reveal {
            0% {
                opacity: 0;
                filter: blur(30px);
                transform: scale(0.9);
            }
            /* 20%の地点まで透明を維持することで、パッと出を防ぐ */
            20% {
                opacity: 0;
                filter: blur(30px);
            }
            100% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
        }

        .fade-out {
            animation: fadeOut 0.8s ease-in forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-text">TECHSTA</div>
    </div>

    <script>
        // アニメーションを少し長めにしたので、待ち時間も調整
        setTimeout(() => {
            document.body.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = 'text.html';
            }, 800);
            
        }, 2000); // 2秒間表示
    </script>

</body>
</html>
