<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECHSTA DROP</title>
    <style>
        :root { --primary: #007AFF; --bg: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #game-area { width: 320px; height: 400px; background: #f9f9f9; border: 4px solid #eee; position: relative; overflow: hidden; margin-top: 20px; border-radius: 0 0 20px 20px; }
        .ball { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: transform 0.1s linear; pointer-events: none; }
        .ad-box { width: 100%; max-width: 320px; text-align: center; margin-top: auto; padding-bottom: 20px; }
        .ad-label { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div style="padding-top: 20px; font-size: 20px; font-weight: 800; color: var(--primary);">SCORE: <span id="score">0</span></div>
    <p style="font-size: 12px; color: #666;">タップした場所にアイコンが落ちるよ！</p>

    <div id="game-area" onclick="dropItem(event)">
        <!-- ここにアイコンが落ちる -->
    </div>

    <!-- 広告エリア -->
    <div class="ad-box">
        <span class="ad-label">[広告]</span>
        <div id="ad-game-drop"></div>
    </div>

    <script>
        const area = document.getElementById('game-area');
        const scoreDisp = document.getElementById('score');
        let score = 0;
        let items = [];
        const levels = [
            { size: 30, color: '#FF3B30', label: 'T' },
            { size: 50, color: '#FF9500', label: 'E' },
            { size: 70, color: '#FFCC00', label: 'C' },
            { size: 90, color: '#4CD964', label: 'H' },
            { size: 110, color: '#007AFF', label: 'S' }
        ];

        function dropItem(e) {
            const rect = area.getBoundingClientRect();
            const x = e.clientX - rect.left;
            createItem(x, 0, 0);
        }

        function createItem(x, y, lv) {
            const level = levels[lv];
            const div = document.createElement('div');
            div.className = 'ball';
            div.style.width = level.size + 'px';
            div.style.height = level.size + 'px';
            div.style.background = level.size > 80 ? `linear-gradient(135deg, ${level.color}, #5856D6)` : level.color;
            div.innerText = level.label;
            
            // 初期位置設定（端っこで詰まらないように調整）
            const posX = Math.max(0, Math.min(x - level.size/2, area.offsetWidth - level.size));
            div.style.left = posX + 'px';
            div.style.top = y + 'px';
            
            area.appendChild(div);
            items.push({ element: div, x: posX, y: y, lv: lv, size: level.size, vy: 0 });
        }

        function update() {
            const gravity = 0.5;
            items.forEach((item, i) => {
                item.vy += gravity;
                item.y += item.vy;

                // 地面判定
                if (item.y + item.size > area.offsetHeight) {
                    item.y = area.offsetHeight - item.size;
                    item.vy = 0;
                }

                // アイコン同士の衝突（簡易版）
                for (let j = i + 1; j < items.length; j++) {
                    const other = items[j];
                    const dx = (item.x + item.size/2) - (other.x + other.size/2);
                    const dy = (item.y + item.size/2) - (other.y + other.size/2);
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < (item.size/2 + other.size/2)) {
                        // 同じレベルなら合体！
                        if (item.lv === other.lv && item.lv < levels.length - 1) {
                            const newX = (item.x + other.x) / 2;
                            const newY = (item.y + other.y) / 2;
                            const newLv = item.lv + 1;
                            
                            area.removeChild(item.element);
                            area.removeChild(other.element);
                            items.splice(j, 1);
                            items.splice(i, 1);
                            
                            score += (newLv + 1) * 10;
                            scoreDisp.innerText = score;
                            createItem(newX + levels[newLv].size/2, newY, newLv);
                            return;
                        }
                        // ぶつかって止まる処理
                        item.vy = 0;
                        item.y = other.y - item.size;
                    }
                }
                item.element.style.top = item.y + 'px';
            });
            requestAnimationFrame(update);
        }

        // 広告表示ロジック
        const ads = [
            `<a href="//af.moshimo.com/af/c/click?a_id=5526071&p_id=5941&pc_id=16548&pl_id=75907" rel="nofollow"><img src="//image.moshimo.com/af-img/5687/000000075907.jpg" width="100%" style="border-radius:12px;"></a>`,
            `<a href="//af.moshimo.com/af/c/click?a_id=5526070&p_id=1225&pc_id=1925&pl_id=18523" rel="nofollow"><img src="//image.moshimo.com/af-img/0349/000000018523.png" width="300" style="border:none;"></a>`
        ];
        document.getElementById('ad-game-drop').innerHTML = ads[Math.floor(Math.random() * ads.length)];

        update();
    </script>
</body>
</html>
