<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHSTA GAME - 遊びを標準に。</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #ffffff;
            --card-bg: #f5f5f7;
            --text: #1d1d1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 40px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: #fff;
        }

        .game-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .game-card h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: var(--primary);
        }

        .game-card p {
            margin: 0;
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .back-link {
            margin-top: 50px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <h1>TECHSTA GAME</h1>
    <p>技術の合間に、最高の遊びを。</p>
</header>

<div class="game-grid">
    <!-- ランニングゲーム -->
    <a href="game_run.html" class="game-card">
        <div class="game-icon">🏃‍♂️</div>
        <h3>TECHSTA RUN</h3>
        <p>障害物を避けてハイスコアを目指せ！シンプルながら中毒性の高いランニングゲーム。</p>
    </a>

    <!-- 未来のゲームスロット 1 -->
    <a href="#" class="game-card" style="opacity: 0.6; pointer-events: none;">
        <div class="game-icon">💻</div>
        <h3>COMMAND BLAST</h3>
        <p>Coming Soon... タイピングでバグを撃破するシューティングゲーム。</p>
    </a>

    <!-- 未来のゲームスロット 2 -->
    <a href="#" class="game-card" style="opacity: 0.6; pointer-events: none;">
        <div class="game-icon">🧩</div>
        <h3>SURGE 2048</h3>
        <p>Coming Soon... 数字を重ねてTECHSTAを進化させるマージパズル。</p>
    </a>
</div>

<a href="text.html" class="back-link">← ツールに戻る</a>

</body>
</html>
