<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TECHSTA GAME - 遊びを標準に。</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #ffffff;
            --card-bg: #f5f5f7;
            --text: #1d1d1f;
            --sub-text: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { padding: 40px 20px 20px; text-align: center; }
        header h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 広告用スタイル (text.htmlと統一) */
        .ad-label { display: block; font-size: 10px; color: var(--sub-text); text-align: center; margin-bottom: 4px; }
        .ad-box { width: 100%; text-align: center; margin: 20px 0; overflow: hidden; border-radius: 12px; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .game-card:active { transform: scale(0.98); }
        .game-icon { font-size: 40px; margin-bottom: 12px; }
        .game-card h3 { margin: 0 0 8px; font-size: 18px; color: var(--primary); }
        .game-card p { margin: 0; font-size: 13px; color: #666; line-height: 1.5; }

        .back-link { margin: 30px 0 60px; color: var(--primary); text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>TECHSTA GAME</h1>
    <p style="font-size: 14px; color: var(--sub-text);">遊びを、標準に。</p>
</header>

<!-- ゲームリストの前に広告 -->
<div class="main-container" style="width: 100%; max-width: 800px; padding: 0 20px; box-sizing: border-box;">
    <div id="ad-game-top" class="ad-box"></div>
</div>

<div class="game-grid">
    <!-- 1. TECHSTA RUN (既存) -->
    <a href="game_run.html" class="game-card">
        <div class="game-icon">🏃‍♂️</div>
        <h3>TECHSTA RUN</h3>
        <p>障害物を避けてハイスコアを目指せ！シンプルながら中毒性の高いランニングゲーム。</p>
    </a>

    <a href="game_cmd.html" class="game-card">
        <div class="game-icon">💻</div>
        <h3>COMMAND BLAST</h3>
        <p>マイクラコマンドを打ち込め！タイピングでバグ（敵）を撃破するシューティング。</p>
    </a>

<a href="game_drop.html" class="game-card">
        <div class="game-icon">⚪️</div>
        <h3>TECHSTA DROP</h3>
        <p>スマホ最適化！アイコンを落として合体させる、爽快な物理演算パズル。</p>
    </a>
</div>

    <a href="game_2048.html" class="game-card">
        <div class="game-icon">🔢</div>
        <h3>SURGE 2048</h3>
        <p>パネルをスライドして合体！SURGEカラーの「2048」パネルを目指す思考型パズル。</p>
    </a>
</div>

<div class="main-container" style="width: 100%; max-width: 800px; padding: 0 20px; box-sizing: border-box;">
    <div id="ad-game-bottom" class="ad-box"></div>
</div>

    <div style="margin-top: 40px; text-align: center;">
    <a href="https://games.ad-hub.f5.si" style="color: #86868b; text-decoration: none; font-size: 14px; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; transition: 0.3s;">
        ← 旧ゲームセンターへ
    </a>
</div>

<a href="text.html" class="back-link">← ツールに戻る</a>

<script>
    // text.html からコピーした広告データとロジック
    const ads = [
        `<a href="//af.moshimo.com/af/c/click?a_id=5526071&p_id=5941&pc_id=16548&pl_id=75907" rel="nofollow" referrerpolicy="no-referrer-when-downgrade" attributionsrc><img src="//image.moshimo.com/af-img/5687/000000075907.jpg" width="100%" style="max-width:728px; border:none; border-radius:12px;"></a>`,
        `<a href="//af.moshimo.com/af/c/click?a_id=5526070&p_id=1225&pc_id=1925&pl_id=18523" rel="nofollow" referrerpolicy="no-referrer-when-downgrade" attributionsrc><img src="//image.moshimo.com/af-img/0349/000000018523.png" width="320" height="51" style="border:none;"></a>`,
        `<a href="//af.moshimo.com/af/c/click?a_id=5526250&p_id=4996&pc_id=13383&pl_id=65991" rel="nofollow" referrerpolicy="no-referrer-when-downgrade" attributionsrc><img src="//image.moshimo.com/af-img/4571/000000065991.png" width="468" height="60" style="border:none;"></a><img src="//i.moshimo.com/af/i/impression?a_id=5526250&p_id=4996&pc_id=13383&pl_id=65991" width="1" height="1" style="border:none;" loading="lazy">`
    ];

    function refreshAds() {
        const adHtml = ads[Math.floor(Math.random() * ads.length)];
        const fullContent = `<span class="ad-label">[広告]</span>` + adHtml;
        document.querySelectorAll('.ad-box').forEach(box => {
            box.innerHTML = fullContent;
        });
    }

    // 読み込み時に実行
    window.addEventListener('load', refreshAds);
</script>

</body>
</html>
